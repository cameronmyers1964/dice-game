<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best of 10 Dice Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
🎲 <b>BEST OF 10 DICE GAME</b> 🎲
</div>

<div class="container">

  <div class="setup">
    <input id="p1" placeholder="Player 1 Name">
    <input id="p2" placeholder="Player 2 Name">
    <button id="startBtn">Start Game</button>
  </div>

  <div id="status">Enter names to begin</div>

  <div id="scores"></div>

  <div class="players">

    <div class="card blue">
      <h2 id="p1Name">Player 1</h2>

      <div class="diceRow">
        <div class="dice" id="p1d1"></div>
        <div class="dice" id="p1d2"></div>
      </div>
    </div>

    <div class="card pink">
      <h2 id="p2Name">Player 2</h2>

      <div class="diceRow">
        <div class="dice" id="p2d1"></div>
        <div class="dice" id="p2d2"></div>
      </div>
    </div>

  </div>

  <div id="history"></div>

  <button id="rollBtn" disabled>ROLL</button>
  <button id="resetBtn">RESET</button>

</div>

<script src="script.js"></script>
</body>
</html>
