<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best of 10 Dice Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎲 BEST OF 10 DICE GAME 🎲</h1>

<div class="setup">
    <input type="text" id="p1" placeholder="Player 1 Name">
    <input type="text" id="p2" placeholder="Player 2 Name">
    <button id="startBtn">Start Game</button>
</div>

<h2 id="status">Enter names and press Start Game</h2>

<div id="scores"></div>

<div class="players">

    <div class="player">
        <h2 id="p1Name">Player 1</h2>

        <div class="dice-row">
            <div class="die" id="p1d1"></div>
            <div class="die" id="p1d2"></div>
        </div>

        <div id="p1Total"></div>
    </div>

    <div class="player">
        <h2 id="p2Name">Player 2</h2>

        <div class="dice-row">
            <div class="die" id="p2d1"></div>
            <div class="die" id="p2d2"></div>
        </div>

        <div id="p2Total"></div>
    </div>

</div>

<button id="rollBtn" disabled>ROLL</button>
<button id="resetBtn">RESET</button>

<div id="history"></div>

<script src="script.js"></script>
</body>
</html>
